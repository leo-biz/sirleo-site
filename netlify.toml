[build]
  command = "npm --prefix netlify/functions install && node scripts/version.js"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/book"
  to   = "/book.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to   = "/pricing.html"
  status = 200

[[redirects]]
  from = "/build"
  to   = "/build.html"
  status = 200

[[redirects]]
  from = "/pay-success"
  to   = "/pay-success.html"
  status = 200

[[redirects]]
  from = "/events"
  to   = "/events.html"
  status = 200

[[redirects]]
  from = "/sessions"
  to   = "/sessions.html"
  status = 200

[[redirects]]
  from = "/education"
  to   = "/education.html"
  status = 200

[[redirects]]
  from = "/group"
  to   = "/group.html"
  status = 200

[[redirects]]
  from = "/training"
  to   = "/education.html"
  status = 301


[functions."followup"]
  schedule = "0 17 * * *"
