<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Your Booking — Sir Leo</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="stripe-config.js"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    .build-page { min-height: 100vh; padding: 80px 24px 160px; }
    .build-inner { max-width: 720px; margin: 0 auto; }

    /* ── Header ── */
    .build-header { margin-bottom: 56px; }
    .build-eyebrow { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: #6B1A1A; margin-bottom: 12px; }
    .build-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(32px, 5vw, 48px); font-weight: 300; font-style: italic; line-height: 1.15; margin-bottom: 12px; }
    .build-sub { font-size: 14px; opacity: 0.5; line-height: 1.8; }
    .build-mode-note { margin-top: 18px; font-size: 11px; opacity: 0.38; letter-spacing: 0.04em; line-height: 1.8; }

    /* ── Sections ── */
    .build-section { margin-bottom: 48px; }
    .build-section-label { font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: #6B1A1A; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    [data-theme="light"] .build-section-label { border-bottom-color: rgba(26,14,6,0.1); }

    /* ── Duration (radio cards) ── */
    .duration-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 500px) { .duration-grid { grid-template-columns: 1fr; } }
    .duration-card { border: 1px solid rgba(255,255,255,0.08); padding: 20px; cursor: pointer; transition: all 0.15s; position: relative; }
    .duration-card:hover { border-color: rgba(107,26,26,0.4); }
    .duration-card.selected { border-color: rgba(107,26,26,0.7); background: rgba(107,26,26,0.1); }
    .duration-card input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
    .duration-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; font-weight: 300; margin-bottom: 4px; }
    .duration-time { font-size: 11px; opacity: 0.45; letter-spacing: 0.1em; margin-bottom: 12px; }
    .duration-price { font-size: 22px; font-weight: 300; }
    .duration-price span { font-size: 13px; opacity: 0.5; }
    [data-theme="light"] .duration-card { border-color: rgba(26,14,6,0.1); }
    [data-theme="light"] .duration-card.selected { border-color: rgba(107,26,26,0.6); }

    /* ── Add-ons (checkboxes) ── */
    .addon-list { display: flex; flex-direction: column; gap: 2px; }
    .addon-item { display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: all 0.12s; }
    .addon-item:hover { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.1); }
    .addon-item.checked { background: rgba(107,26,26,0.08); border-color: rgba(107,26,26,0.35); }
    .addon-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #6B1A1A; cursor: pointer; flex-shrink: 0; }
    .addon-info { flex: 1; }
    .addon-name { font-size: 14px; margin-bottom: 3px; }
    .addon-desc { font-size: 12px; opacity: 0.4; line-height: 1.5; }
    .addon-price { font-size: 15px; font-weight: 300; white-space: nowrap; opacity: 0.8; }
    [data-theme="light"] .addon-item { border-color: rgba(26,14,6,0.08); }

    /* ── Group type selector ── */
    .group-type-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .group-type-selector { grid-template-columns: 1fr; } }
    .group-type-card { padding: 24px 20px; border: 1px solid rgba(107,26,26,0.2); cursor: pointer; transition: all 0.15s; }
    .group-type-card:hover { border-color: rgba(107,26,26,0.45); background: rgba(107,26,26,0.04); }
    .group-type-card.active { border-color: rgba(107,26,26,0.7); background: rgba(107,26,26,0.1); }
    .group-type-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--cream, #F0E6CE); margin-bottom: 6px; }
    .group-type-sub { font-size: 12px; color: var(--text-muted, #A89878); letter-spacing: 0.05em; line-height: 1.6; }
    [data-theme="light"] .group-type-card { border-color: rgba(107,26,26,0.15); }
    [data-theme="light"] .group-type-card.active { border-color: rgba(107,26,26,0.5); }

    /* ── Group tier / show cards ── */
    .tier-grid { display: flex; flex-direction: column; gap: 2px; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .tier-card { display: grid; grid-template-columns: 1fr auto; align-items: start; gap: 8px 20px; padding: 22px 20px; border: 1px solid rgba(107,26,26,0.15); cursor: pointer; transition: all 0.12s; }
    .tier-card:hover { border-color: rgba(107,26,26,0.4); background: rgba(107,26,26,0.04); }
    .tier-card.selected { border-color: rgba(107,26,26,0.7); background: rgba(107,26,26,0.09); }
    .tier-card-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--cream, #F0E6CE); margin-bottom: 2px; }
    .tier-card-level { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(200,80,80,0.9); margin-bottom: 4px; }
    .tier-card-desc { font-size: 13px; color: var(--text-body, #B0A080); line-height: 1.7; grid-column: 1 / -1; margin-top: 4px; }
    .tier-card-note { font-size: 11px; color: var(--text-muted, #A89878); letter-spacing: 0.04em; }
    .tier-card-price { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--cream, #F0E6CE); white-space: nowrap; text-align: right; }
    [data-theme="light"] .tier-card { border-color: rgba(107,26,26,0.12); }
    [data-theme="light"] .tier-card.selected { border-color: rgba(107,26,26,0.45); }

    /* ── Guest calculator ── */
    .guest-calc { margin-top: 16px; padding: 22px 20px; border: 1px solid rgba(107,26,26,0.15); }
    [data-theme="light"] .guest-calc { border-color: rgba(107,26,26,0.12); }
    .guest-calc-label { font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(200,80,80,0.9); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(107,26,26,0.15); }
    [data-theme="light"] .guest-calc-label { border-bottom-color: rgba(107,26,26,0.1); }
    .guest-calc-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .guest-calc-input-label { font-size: 13px; color: var(--text-sub, #D2BEA5); }
    .guest-calc-note { font-size: 11px; color: var(--text-muted, #A89878); }
    .calc-stepper { display: flex; align-items: center; }
    .calc-step-btn { width: 36px; height: 36px; background: transparent; border: 1px solid rgba(107,26,26,0.3); color: var(--cream, #F0E6CE); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; line-height: 1; }
    .calc-step-btn:hover { background: rgba(107,26,26,0.2); border-color: rgba(107,26,26,0.5); }
    .calc-step-val { width: 44px; height: 36px; border-top: 1px solid rgba(107,26,26,0.25); border-bottom: 1px solid rgba(107,26,26,0.25); border-left: none; border-right: none; background: rgba(107,26,26,0.06); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--cream, #F0E6CE); }
    [data-theme="light"] .calc-step-btn { border-color: rgba(107,26,26,0.2); }
    [data-theme="light"] .calc-step-val { border-color: rgba(107,26,26,0.18); }
    .guest-calc-result { border-top: 1px solid rgba(107,26,26,0.15); padding-top: 18px; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; }
    [data-theme="light"] .guest-calc-result { border-top-color: rgba(107,26,26,0.1); }
    .guest-calc-breakdown { font-size: 12px; color: var(--text-muted, #A89878); margin-top: 4px; }
    .guest-calc-total { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--cream, #F0E6CE); }

    /* ── Notes ── */
    .build-textarea { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: inherit; padding: 16px; font-size: 14px; width: 100%; min-height: 100px; resize: vertical; outline: none; font-family: 'Montserrat', sans-serif; line-height: 1.7; }
    .build-textarea:focus { border-color: rgba(107,26,26,0.5); }
    .build-textarea::placeholder { opacity: 0.3; }
    [data-theme="light"] .build-textarea { border-color: rgba(26,14,6,0.1); }

    /* ── Summary bar ── */
    .summary-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0e0e0e; border-top: 1px solid rgba(107,26,26,0.3); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; gap: 24px; z-index: 50; }
    [data-theme="light"] .summary-bar { background: #f0ebe0; border-top-color: rgba(107,26,26,0.2); }
    .summary-left { display: flex; flex-direction: column; gap: 4px; }
    .summary-items { font-size: 11px; opacity: 0.45; letter-spacing: 0.05em; }
    .summary-total { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; }
    .summary-note { font-size: 11px; opacity: 0.4; }
    .summary-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .deposit-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; opacity: 0.6; cursor: pointer; }
    .deposit-toggle input { accent-color: #6B1A1A; cursor: pointer; }
    .pay-btn { background: #6B1A1A; color: #f0e6d0; border: none; padding: 14px 36px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 500; transition: background 0.15s; white-space: nowrap; }
    .pay-btn:hover { background: #8B2020; }
    .pay-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .summary-bar.inquiry-mode .deposit-toggle { display: none; }
    @media (max-width: 600px) {
      .summary-bar { flex-direction: column; align-items: flex-start; padding: 16px 20px; }
      .summary-right { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<div id="sl-cursor"></div>
<div id="sl-cursor-ring"></div>

<div data-site-nav data-nav-cta-id="nav-book-link" data-nav-cta-label="Book" data-nav-cta-href="/book"></div>
<script src="src/js/site-nav.js"></script>

<main class="build-page">
  <div class="build-inner">

    <div class="build-header">
      <div class="build-eyebrow" id="build-eyebrow">Session Builder</div>
      <h1 class="build-title" id="build-title">Build your<br><em>session.</em></h1>
      <p class="build-sub" id="build-sub">Select your duration and any additions. Pay a deposit to secure your date.</p>
      <p class="build-mode-note" id="build-mode-note" hidden></p>
    </div>

    <!-- Duration -->
    <div class="build-section">
      <div class="build-section-label" id="duration-label">Duration</div>
      <div class="duration-grid" id="duration-grid"></div>
    </div>

    <!-- Add-ons -->
    <div class="build-section">
      <div class="build-section-label" id="addon-label">Add-ons</div>
      <div class="addon-list" id="addon-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Notes -->
    <div class="build-section">
      <div class="build-section-label" id="notes-label">Anything to note</div>
      <textarea class="build-textarea" id="session-notes" placeholder="Hard limits, intentions, questions — anything Sir Leo should know before your session."></textarea>
    </div>

    <!-- Spacer for fixed bar -->
    <div style="height:100px;"></div>

  </div>
</main>

<!-- Summary bar -->
<div class="summary-bar">
  <div class="summary-left">
    <div class="summary-items" id="summary-items">Sensual Surrender</div>
    <div class="summary-total" id="summary-total">$200</div>
    <div class="summary-note" id="summary-note">Full payment due today</div>
  </div>
  <div class="summary-right">
    <label class="deposit-toggle">
      <input type="checkbox" id="full-payment" checked>
      Pay in full
    </label>
    <button class="pay-btn" id="pay-btn">Secure Session →</button>
  </div>
</div>

<script src="src/data/session-catalog.js"></script>
<script src="src/data/group-catalog.js"></script>
<script>
const SESSION_CATALOG = window.SL_SESSION_CATALOG;
const PACKAGES = SESSION_CATALOG.packages;
const ADDONS = SESSION_CATALOG.addons;
const DEPOSIT_PCT = SESSION_CATALOG.depositPct;
const params = new URLSearchParams(window.location.search);
const offerId = params.get('id');
const clientParam = params.get('client');
const requestedType = [
  window.location.pathname,
  window.location.search,
  window.location.hash,
  ...Array.from(params.keys()),
  ...Array.from(params.values()),
].filter(Boolean).join(' ').toLowerCase();
const buildType = /\b(group|groups|event|events|bachelorette|performance)\b/.test(requestedType) ? 'group' : 'session';
document.documentElement.dataset.buildType = buildType;
// ── State ──
let baseCost = buildType === 'session' ? PACKAGES[0].price : 0;
let selectedAddons = new Set();
let payFull = true;

if (buildType === 'session') {
  // ── Session: render duration cards ──
  const durationGrid = document.getElementById('duration-grid');
  PACKAGES.forEach((pkg, index) => {
    const item = document.createElement('label');
    item.className = `duration-card${index === 0 ? ' selected' : ''}`;
    item.innerHTML = `
      <input type="radio" name="duration" value="${pkg.minutes}" data-id="${pkg.id}" data-price="${pkg.price}" ${index === 0 ? 'checked' : ''}>
      <div class="duration-name">${pkg.name}</div>
      <div class="duration-time">${pkg.shortDescription}</div>
      <div class="duration-price">$<span>${pkg.price}</span></div>
    `;
    durationGrid.appendChild(item);
  });

  // ── Session: render add-ons ──
  const addonList = document.getElementById('addon-list');
  ADDONS.forEach(addon => {
    const item = document.createElement('label');
    item.className = 'addon-item';
    item.innerHTML = `
      <input type="checkbox" id="addon-${addon.id}" value="${addon.id}" data-price="${addon.price || 0}">
      <div class="addon-info">
        <div class="addon-name">${addon.name}</div>
        <div class="addon-desc">${addon.desc}</div>
      </div>
      <div class="addon-price">+$${addon.price}</div>
    `;
    item.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) { selectedAddons.add(addon.id); item.classList.add('checked'); }
      else { selectedAddons.delete(addon.id); item.classList.remove('checked'); }
      updateSummary();
    });
    addonList.appendChild(item);
  });

  // ── Session: duration selection ──
  document.querySelectorAll('[name="duration"]').forEach(radio => {
    radio.addEventListener('change', () => {
      document.querySelectorAll('.duration-card').forEach(c => c.classList.remove('selected'));
      radio.closest('.duration-card').classList.add('selected');
      baseCost = parseInt(radio.dataset.price || '0');
      updateSummary();
    });
  });
} else {
  // ── Group mode render ──
  const GC = window.SL_GROUP_CATALOG;
  let groupViewType = 'experience'; // 'experience' | 'performance'
  let selectedTier = GC.tiers[0];
  let extraGuests = 0;

  const durationGrid = document.getElementById('duration-grid');
  const addonList    = document.getElementById('addon-list');

  // Two type-selector cards
  durationGrid.className = 'group-type-selector';
  durationGrid.innerHTML = `
    <div class="group-type-card active" data-gtype="experience">
      <div class="group-type-name">Group Intimate Experience</div>
      <div class="group-type-sub">One featured guest · the room watches · Sir Leo travels to you</div>
    </div>
    <div class="group-type-card" data-gtype="performance">
      <div class="group-type-name">Performance</div>
      <div class="group-type-sub">Live show set · venue, club, or private event</div>
    </div>
  `;

  // Inject guest calculator after addon-list section
  addonList.closest('.build-section').insertAdjacentHTML('afterend', `
    <div class="build-section" id="guest-calc-section" style="display:none;">
      <div class="guest-calc">
        <div class="guest-calc-label">Additional Guests</div>
        <div class="guest-calc-row">
          <span class="guest-calc-input-label">Extra observers</span>
          <div class="calc-stepper">
            <button class="calc-step-btn" id="guest-minus">−</button>
            <div class="calc-step-val" id="guest-count-val">0</div>
            <button class="calc-step-btn" id="guest-plus">+</button>
          </div>
          <span class="guest-calc-note">4 included · max 4 additional</span>
        </div>
        <div class="guest-calc-result">
          <div>
            <div style="font-size:12px;opacity:0.5;">Estimated total</div>
            <div class="guest-calc-breakdown" id="guest-calc-breakdown"></div>
          </div>
          <div class="guest-calc-total" id="guest-calc-total"></div>
        </div>
      </div>
    </div>
  `);

  document.getElementById('guest-minus').addEventListener('click', () => {
    if (extraGuests > 0) { extraGuests--; updateGroupCalc(); }
  });
  document.getElementById('guest-plus').addEventListener('click', () => {
    if (extraGuests < 4) { extraGuests++; updateGroupCalc(); }
  });

  function updateGroupCalc() {
    document.getElementById('guest-count-val').textContent = extraGuests;
    const guestCost = extraGuests * selectedTier.observerFee;
    const total = selectedTier.price + guestCost;
    baseCost = total;
    document.getElementById('guest-calc-total').textContent = '$' + total;
    document.getElementById('guest-calc-breakdown').textContent = extraGuests > 0
      ? `$${selectedTier.price} base · ${extraGuests} guest${extraGuests > 1 ? 's' : ''} × $${selectedTier.observerFee} = $${guestCost}`
      : `$${selectedTier.price} base · no additional guests`;
    updateSummary();
  }

  function renderGroupCards() {
    addonList.innerHTML = '';
    addonList.className = 'tier-grid';
    const calcSection = document.getElementById('guest-calc-section');

    if (groupViewType === 'experience') {
      calcSection.style.display = '';
      GC.tiers.forEach((tier, i) => {
        const card = document.createElement('div');
        card.className = `tier-card${i === 0 ? ' selected' : ''}`;
        card.innerHTML = `
          <div>
            <div class="tier-card-name">${tier.name}</div>
            <div class="tier-card-level">${tier.level}</div>
            <div class="tier-card-note">${tier.shortDescription}</div>
          </div>
          <div class="tier-card-price">$${tier.price}</div>
          <div class="tier-card-desc">${tier.desc}</div>
        `;
        card.addEventListener('click', () => {
          addonList.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedTier = tier;
          extraGuests = 0;
          document.getElementById('guest-count-val').textContent = 0;
          updateGroupCalc();
        });
        addonList.appendChild(card);
      });
      selectedTier = GC.tiers[0];
      extraGuests = 0;
      document.getElementById('guest-count-val').textContent = 0;
      updateGroupCalc();
    } else {
      calcSection.style.display = 'none';
      baseCost = 0;
      GC.shows.forEach(show => {
        const card = document.createElement('div');
        card.className = 'tier-card';
        card.innerHTML = `
          <div>
            <div class="tier-card-name">${show.name}</div>
            <div class="tier-card-note">${show.shortDescription}</div>
          </div>
          <div class="tier-card-price">$${show.price}</div>
          <div class="tier-card-desc">${show.desc}</div>
        `;
        card.addEventListener('click', () => {
          addonList.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          baseCost = show.price;
          updateSummary();
        });
        addonList.appendChild(card);
      });
      updateSummary();
    }
  }

  // Type-card toggle
  durationGrid.querySelectorAll('.group-type-card').forEach(card => {
    card.addEventListener('click', () => {
      durationGrid.querySelectorAll('.group-type-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      groupViewType = card.dataset.gtype;
      renderGroupCards();
    });
  });

  renderGroupCards();
}

// ── Full payment toggle ──
document.getElementById('full-payment').addEventListener('change', e => {
  payFull = e.target.checked;
  updateSummary();
});

// ── Summary ──
function updateSummary() {
  if (buildType === 'group') {
    const typeCard = document.querySelector('.group-type-card.active');
    const tierCard = document.querySelector('.tier-card.selected');
    const typeLabel = typeCard?.querySelector('.group-type-name')?.textContent || 'Group Experience';
    const tierLabel = tierCard?.querySelector('.tier-card-name')?.textContent || '';
    document.getElementById('summary-items').textContent = [typeLabel, tierLabel].filter(Boolean).join(' · ');
    document.getElementById('summary-total').textContent = baseCost > 0 ? `$${baseCost}` : 'Inquiry';
    document.getElementById('summary-note').textContent = 'Estimated — Sir Leo will confirm travel, guests, and final price.';
    return;
  }

  const addonCost = ADDONS.filter(a => selectedAddons.has(a.id)).reduce((s, a) => s + a.price, 0);
  const total = baseCost + addonCost;
  const due = payFull ? total : Math.round(total * DEPOSIT_PCT);

  const durationLabel = document.querySelector('[name="duration"]:checked')?.closest('.duration-card')?.querySelector('.duration-name')?.textContent || '';
  const addonNames = ADDONS.filter(a => selectedAddons.has(a.id)).map(a => a.name);
  const itemsText = [durationLabel, ...addonNames].filter(Boolean).join(' · ');

  document.getElementById('summary-items').textContent = itemsText;
  document.getElementById('summary-total').textContent = `$${total}`;
  document.getElementById('summary-note').textContent = payFull
    ? 'Full payment due today'
    : `Deposit: $${due} due today — remainder at session`;
}

// ── Pay button ──
const stripe = window.SL_STRIPE_PK ? Stripe(window.SL_STRIPE_PK) : null;

document.getElementById('pay-btn').addEventListener('click', async () => {
  if (buildType === 'group') {
    const typeCard  = document.querySelector('.group-type-card.active');
    const tierCard  = document.querySelector('.tier-card.selected');
    const typeLabel = typeCard?.querySelector('.group-type-name')?.textContent || '';
    const tierLabel = tierCard?.querySelector('.tier-card-name')?.textContent || '';
    const notes     = document.getElementById('session-notes').value.trim();
    const guestVal  = document.getElementById('guest-count-val')?.textContent || '0';
    try {
      sessionStorage.setItem('sl_group_build', JSON.stringify({
        id: offerId || '',
        type: typeLabel,
        tier: tierLabel,
        estimatedTotal: baseCost,
        extraGuests: parseInt(guestVal),
        notes,
        createdAt: new Date().toISOString(),
      }));
    } catch {}
    window.location.href = '/events?open=group-build';
    return;
  }

  if (!stripe) { alert('Payment not configured. Contact Sir Leo directly.'); return; }
  const btn = document.getElementById('pay-btn');
  btn.disabled = true;
  btn.textContent = 'Redirecting…';

  const selectedDuration = document.querySelector('[name="duration"]:checked');
  const durationName = selectedDuration?.closest('.duration-card')?.querySelector('.duration-name')?.textContent || '';
  const durationMinutes = parseInt(selectedDuration?.value || '90');
  const durationId = selectedDuration?.dataset.id || '';
  const addonCost = ADDONS.filter(a => selectedAddons.has(a.id)).reduce((s, a) => s + a.price, 0);
  const total = baseCost + addonCost;
  const due = payFull ? total : Math.round(total * DEPOSIT_PCT);
  const addonsSelected = ADDONS.filter(a => selectedAddons.has(a.id));
  const addonIds = addonsSelected.map(addon => addon.id);
  const notes = document.getElementById('session-notes').value;
  const params = new URLSearchParams(window.location.search);
  const clientName = params.get('client') || '';

  try {
    const res = await fetch('/.netlify/functions/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ durationId, addonIds, durationName, durationMinutes, basePrice: baseCost, addons: addonsSelected, total, due, payFull, notes, clientName, offerId: loadedOfferId }),
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      throw new Error(data.error || 'No checkout URL returned');
    }
  } catch (err) {
    alert('Something went wrong: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Secure Session →';
  }
});

// ── Load session offer by ID or fall back to ?client param ──
let loadedOfferId = null;

async function loadOffer(id) {
  try {
    const res = await fetch(`/.netlify/functions/get-session?id=${id}`);
    if (!res.ok) return;
    const offer = await res.json();
    loadedOfferId = offer.id;

    // Personalize heading
    if (offer.client_name) {
      const label = buildType === 'group' ? 'experience' : 'session';
      document.getElementById('build-title').innerHTML = `${offer.client_name}'s<br><em>${label}.</em>`;
    }

    // Block if already paid
    if (['paid','completed'].includes(offer.status)) {
      document.getElementById('pay-btn').disabled = true;
      document.getElementById('pay-btn').textContent = 'Already paid ✓';
      document.getElementById('summary-note').textContent = 'This session has been secured.';
    }

    // Pre-select duration
    if (offer.duration_name || offer.duration_value) {
      const expectedName = (offer.duration_name || '').trim().toLowerCase();
      const radio = [...document.querySelectorAll('[name="duration"]')].find(input => {
        const name = input.closest('.duration-card')?.querySelector('.duration-name')?.textContent.trim().toLowerCase();
        return expectedName ? name === expectedName : input.dataset.price === String(offer.duration_value);
      });
      if (radio) {
        radio.checked = true;
        document.querySelectorAll('.duration-card').forEach(c => c.classList.remove('selected'));
        radio.closest('.duration-card').classList.add('selected');
        baseCost = parseInt(radio.dataset.price);
      }
    }

    // Pre-check add-ons
    if (offer.addon_ids?.length) {
      offer.addon_ids.forEach(id => {
        const cb = document.getElementById(`addon-${id}`);
        if (cb) {
          cb.checked = true;
          cb.closest('.addon-item')?.classList.add('checked');
          selectedAddons.add(id);
        }
      });
    }

    // Show notes from Sir Leo
    if (offer.notes) {
      const notesSection = document.getElementById('session-notes');
      notesSection.placeholder = offer.notes;
    }

    updateSummary();
  } catch (e) {
    console.warn('Could not load session offer:', e);
  }
}

if (offerId) {
  loadOffer(offerId);
} else if (clientParam) {
  const label = buildType === 'group' ? 'experience' : 'session';
  document.getElementById('build-title').innerHTML = `${clientParam}'s<br><em>${label}.</em>`;
}

if (buildType === 'group') {
  document.title = 'Build Your Group Experience — Sir Leo';
  document.querySelector('.summary-bar')?.classList.add('inquiry-mode');
  document.getElementById('build-eyebrow').textContent = 'Group Builder';
  document.getElementById('build-title').innerHTML = 'Build your<br><em>group experience.</em>';
  document.getElementById('build-sub').textContent = 'Choose the shape of the experience before the inquiry. This gives Sir Leo enough context to call with the right questions.';
  const note = document.getElementById('build-mode-note');
  note.hidden = false;
  note.textContent = 'No payment is collected here. Exact pricing is confirmed after fit, location, guest count, travel, and intensity are reviewed.';
  document.getElementById('duration-label').textContent = 'Experience Type';
  document.getElementById('addon-label').textContent = 'Select a Tier';
  document.getElementById('notes-label').textContent = 'Event details';
  document.getElementById('session-notes').placeholder = 'Date, city, venue type, occasion, desired tone, and anything Sir Leo should know before calling.';
  document.getElementById('pay-btn').textContent = 'Continue to Inquiry →';

  // Pre-select type from ?gtype param (set by group.html links)
  const gtypeParam = params.get('gtype');
  if (gtypeParam) {
    const target = document.querySelector(`.group-type-card[data-gtype="${gtypeParam}"]`);
    if (target) target.click();
  }
}

// Init
updateSummary();

// Theme
(function() {
  const saved = localStorage.getItem('sl-theme') || 'dark';
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();

// Cursor
(function() {
  const dot = document.getElementById('sl-cursor');
  const ring = document.getElementById('sl-cursor-ring');
  if (!dot || !ring) return;
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });
  (function loop(){ rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
  document.addEventListener('mouseover', e => {
    const over = e.target.closest('a, button, label');
    ring.style.width = over ? '48px' : '32px';
    ring.style.height = over ? '48px' : '32px';
  });
})();
</script>
